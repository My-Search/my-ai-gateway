<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="loadingGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#58a6ff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#bc8cff;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <!-- 背景圆环 -->
  <circle cx="16" cy="16" r="14" fill="none" stroke="#1a2332" stroke-width="2"/>

  <!-- 渐变圆环（带缺口） -->
  <circle cx="16" cy="16" r="14" fill="none" stroke="url(#loadingGrad)" stroke-width="2"
          stroke-dasharray="60 30" stroke-linecap="round" transform="rotate(-90 16 16)"/>
</svg>