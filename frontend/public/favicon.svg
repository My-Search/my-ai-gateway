<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="mainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#58a6ff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#bc8cff;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#bc8cff"/>
    </linearGradient>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#1a2332"/>
      <stop offset="100%" style="stop-color:#0a0e14"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="0.8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="textGlow">
      <feGaussianBlur stdDeviation="0.6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="32" height="32" rx="6" fill="url(#bgGlow)"/>

  <!-- 边框发光 -->
  <rect x="0.5" y="0.5" width="31" height="31" rx="5.5" fill="none" stroke="url(#mainGrad)" stroke-width="1" opacity="0.7" filter="url(#glow)"/>

  <!-- 装饰角标 -->
  <g stroke="url(#mainGrad)" stroke-width="0.8" fill="none" opacity="0.5">
    <path d="M3 7 L3 3 L7 3"/>
    <path d="M25 3 L29 3 L29 7"/>
    <path d="M29 25 L29 29 L25 29"/>
    <path d="M7 29 L3 29 L3 25"/>
  </g>

  <!-- MAG 文字 -->
  <g filter="url(#textGlow)">
    <!-- M -->
    <path d="M4 22 L4 10 L7.5 16 L11 10 L11 22" fill="none" stroke="url(#textGrad)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- A -->
    <path d="M13 22 L16 10 L19 22 M14 17.5 L18 17.5" fill="none" stroke="url(#textGrad)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- G -->
    <path d="M27 13 Q27 10 24 10 Q21 10 21 16 Q21 22 24 22 Q27 22 27 19 L27 16.5 L24.5 16.5" fill="none" stroke="url(#textGrad)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- 底部装饰线 -->
  <line x1="6" y1="26" x2="26" y2="26" stroke="url(#mainGrad)" stroke-width="0.5" opacity="0.4"/>
  <circle cx="6" cy="26" r="0.8" fill="#00d4ff" opacity="0.6"/>
  <circle cx="16" cy="26" r="0.8" fill="#58a6ff" opacity="0.6"/>
  <circle cx="26" cy="26" r="0.8" fill="#bc8cff" opacity="0.6"/>
</svg>
