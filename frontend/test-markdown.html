<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="../node_modules/github-markdown-css/github-markdown-dark.css">
<style>
/* 模拟 ChatPlayground 全局覆盖块 */
.chat-playground .markdown-body {
  background-color: transparent !important;
  color: var(--text-primary);
  white-space: normal;
  font-size: 14px !important;
  line-height: 1.6 !important;
}
.chat-playground .markdown-body p,
.chat-playground .markdown-body blockquote,
.chat-playground .markdown-body pre,
.chat-playground .markdown-body hr,
.chat-playground .markdown-body table,
.chat-playground .markdown-body ul,
.chat-playground .markdown-body ol,
.chat-playground .markdown-body dl,
.chat-playground .markdown-body figure {
  margin-top: 0 !important;
  margin-bottom: 8px !important;
}
.chat-bubble {
  background: #141414;
  border: 1px solid #282828;
  padding: 10px 14px;
  border-radius: 12px;
  font-size: 14px;
  line-height: 1.6;
  max-width: 90%;
}
</style>
</head>
<body style="background:#000">
<div class="chat-bubble">
  <div class="markdown-body">
    <h1>我的小老头</h1>
    <p>"小老头"——这是我对父亲专属的称呼。他其实才四十出头，可鬓早已斑白，额头上的皱纹像被刀刻过，背也微微有些驼了。</p>
    <p>用户只给了这个简短的提示，所以需要构思一篇完整的作文。</p>
    <p>"小老头"这个称呼带着亲昵和一点调皮，作文风格应该是温暖、怀旧的。</p>
  </div>
</div>
</body>
</html>
