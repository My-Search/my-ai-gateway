server:
  port: 1399
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true
  # SSE 流式优化：减小 socket buffer 让每次 flush 立即发送给客户端
  tomcat:
    socket:
      buffer: 1024

spring:
  application:
    name: my-ai-gateway
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  sql:
    init:
      mode: never
  datasource:
    url: 'jdbc:sqlite:data/gateway.db'
    driver-class-name: org.sqlite.JDBC
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      connection-init-sql: "PRAGMA journal_mode=WAL;PRAGMA synchronous=NORMAL;PRAGMA cache_size=-64000;PRAGMA temp_store=MEMORY;PRAGMA mmap_size=268435456;PRAGMA foreign_keys=ON;PRAGMA busy_timeout=30000;"

# MyBatis-Plus
mybatis-plus:
  global-config:
    db-config:
      id-type: AUTO
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

# Logging
logging:
  level:
    com.myai.gateway: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] [%X{traceId}] %-5level %logger{36} - %msg%n"

# App config (管理员账号从数据库读取)
app:
  jwt:
    # JWT 签名密钥：通过环境变量 APP_JWT_SECRET 覆盖，未设置时使用内置默认值（仅适合开发，生产环境必须修改）
    # 启动时若仍为默认值或长度不足会打印 WARN 日志（见 JwtTokenProvider#validateSecret）
    secret: ${APP_JWT_SECRET:my-ai-gateway-jwt-secret-key-2024-change-in-production}
    # Token 过期时间（毫秒），365 天，实现持久登录
    expiration: 31536000000
  relay:
    connect-timeout: 60000
    read-timeout: 120000
    max-retries: 3

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always
