services:
  my-ai-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    image: my-ai-api/gateway:local
    container_name: my-ai-gateway
    restart: unless-stopped
    env_file:
      - .env.compose
    environment:
      SPRING_DATASOURCE_URL: jdbc:sqlite:/app/data/gateway.db
      JAVA_TOOL_OPTIONS: -Dfile.encoding=UTF-8
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:1399/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  my-ai-frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    image: my-ai-api/frontend:local
    container_name: my-ai-frontend
    restart: unless-stopped
    depends_on:
      my-ai-gateway:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-3990}:80"
